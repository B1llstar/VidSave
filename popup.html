<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>VidSave</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #14161a;
    color: #f0f0f2;
    margin: 0;
    padding: 18px;
    width: 260px;
  }
  h1 {
    font-size: 15px;
    margin: 0 0 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .row {
    font-size: 12px;
    color: #b7b8c0;
    background: #1d2026;
    border: 1px solid #2a2d35;
    border-radius: 8px;
    padding: 10px;
    margin-bottom: 10px;
  }
  .row strong { color: #f0f0f2; }
  button {
    width: 100%;
    background: #5b8cff;
    color: white;
    border: none;
    border-radius: 6px;
    padding: 9px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  button:hover { background: #4a78e6; }
  .hint {
    font-size: 11px;
    color: #7d7e87;
    line-height: 1.5;
    margin-top: 10px;
  }
</style>
</head>
<body>
  <h1>⬇ VidSave</h1>
  <div class="row" id="folderStatus">Checking folder…</div>
  <button id="openOptions">Open Settings</button>
  <div class="hint">
    Hover any video on a page and click the save button that appears in its
    top-left corner.
  </div>
  <script src="fs-store.js"></script>
  <script src="popup.js"></script>
</body>
</html>
